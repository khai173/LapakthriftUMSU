<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk Saya - LapakThriftUMSU</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#4f8cff;
  --primary-dark:#1e3a8a;
  --bg:#f4f7fb;
  --border:#dbe4f0;
  --text:#0f172a;
  --shadow:0 10px 30px rgba(79,140,255,.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Manrope',sans-serif;
  background:var(--bg);
  color:var(--text);
}

nav{
  background:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:var(--shadow);
}

.logo{
  font-size:1.3rem;
  font-weight:800;
  color:var(--primary-dark);
}

.logo span{
  color:var(--primary);
}

.back-btn{
  text-decoration:none;
  background:var(--primary);
  color:white;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  flex-wrap:wrap;
  gap:15px;
}

.header h1{
  font-size:2rem;
}

.add-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.stat-card{
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:var(--shadow);
}

.stat-card h3{
  color:#64748b;
  font-size:.9rem;
  margin-bottom:10px;
}

.stat-card p{
  font-size:2rem;
  font-weight:800;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:25px;
}

.product{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.product img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.product-content{
  padding:18px;
}

.product-name{
  font-size:1.1rem;
  font-weight:800;
  margin-bottom:5px;
}

.product-price{
  color:var(--primary-dark);
  font-size:1.2rem;
  font-weight:800;
  margin-bottom:15px;
}

.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:700;
  margin-bottom:15px;
}

.active{
  background:#dcfce7;
  color:#166534;
}

.sold{
  background:#fee2e2;
  color:#991b1b;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.edit{
  background:#f1f5f9;
}

.delete{
  background:#ef4444;
  color:white;
}

.sell{
  background:#22c55e;
  color:white;
}

@media(max-width:768px){
  .header{
    flex-direction:column;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    Lapak<span>ThriftUMSU</span>
  </div>

  <a href="userafterlogin.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Kembali
  </a>
</nav>

<div class="container">

  <div class="header">
    <h1>📦 Produk Saya</h1>

    <button class="add-btn" onclick="window.location.href='upload.html'">
      <i class="fa-solid fa-plus"></i>
      Tambah Produk
    </button>
  </div>

  <div class="stats">

    <div class="stat-card">
      <h3>Total Produk</h3>
      <p id="totalProduk">0</p>
    </div>

    <div class="stat-card">
      <h3>Produk Aktif</h3>
      <p id="produkAktif">0</p>
    </div>

    <div class="stat-card">
      <h3>Produk Terjual</h3>
      <p id="produkTerjual">0</p>
    </div>

  </div>

  <div class="products" id="productsContainer"></div>

</div>

<script>
function requireSellerAccess() {
  const currentUser = '';
  const logged = false;
  const isSeller = localStorage.getItem('isSeller') === 'true';
  if (!logged || !currentUser) {
    sessionStorage.setItem('intended', 'myproducts.html');
    window.location.href = 'login.html';
    return false;
  }
  if (!isSeller) {
    alert('Silakan klik Mulai Berjualan di halaman pengguna untuk mengakses Produk Saya.');
    sessionStorage.setItem('intended', 'seller.html');
    window.location.href = 'userafterlogin.html';
    return false;
  }
  return true;
}

const currentSeller = localStorage.getItem('lapak_current_seller') || '';
let allProducts = JSON.parse(localStorage.getItem("lapak_products")) || [];
let products = [];

function renderProducts(){
  products = allProducts.filter(p => String(p.seller || '').includes(currentSeller));

const container =
document.getElementById("productsContainer");

let aktif = 0;
let terjual = 0;

container.innerHTML = "";

products.forEach((p,index)=>{

if(p.sold){
terjual++;
}else{
aktif++;
}

container.innerHTML += `
<div class="product">

<img src="${p.image}" alt="${p.name}">

<div class="product-content">

<div class="product-name">
${p.name}
</div>

<div class="product-price">
Rp ${Number(p.price).toLocaleString('id-ID')}
</div>

<div class="status ${p.sold ? 'sold':'active'}">
${p.sold ? 'Terjual' : 'Aktif'}
</div>

<div class="actions">

<button class="btn edit"
onclick="editProduct(${index})">
Edit
</button>

<button class="btn delete"
onclick="deleteProduct(${index})">
Hapus
</button>

${
!p.sold
?
`<button class="btn sell"
onclick="markSold(${index})">
Terjual
</button>`
:
''
}

</div>

</div>

</div>
`;
});

  document.getElementById("totalProduk").textContent =
    products.length;

document.getElementById("produkAktif").textContent =
aktif;

document.getElementById("produkTerjual").textContent =
terjual;

}

function deleteProduct(index){

if(confirm("Hapus produk ini?")){
  const product = products[index];
  if (!product) return;
  allProducts = allProducts.filter(p => p.id !== product.id);
  localStorage.setItem("lapak_products", JSON.stringify(allProducts));
  renderProducts();

}

}

function markSold(index){

  const product = products[index];
  if (!product) return;
  const globalIndex = allProducts.findIndex(p => p.id === product.id);
  if (globalIndex === -1) return;
  allProducts[globalIndex].sold = true;
  localStorage.setItem("lapak_products", JSON.stringify(allProducts));
  renderProducts();

}

function editProduct(index){

  const product = products[index];
  if (!product) return;
  localStorage.setItem("edit_product", JSON.stringify(product));

window.location.href =
"upload.html?edit=true";

}

window.addEventListener('DOMContentLoaded', () => {
  if (requireSellerAccess()) {
    allProducts = JSON.parse(localStorage.getItem("lapak_products")) || [];
    renderProducts();
  }
});

</script>

</body>
</html>
